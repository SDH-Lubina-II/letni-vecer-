<!DOCTYPE html>
<html lang="cs">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Výsledky - Motání hadic</title>

<style>
body{
font-family: Arial;
background:#ececec;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
}

h1{
text-align:center;
color:#c62828;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#c62828;
color:white;
}

tr.first{
background: linear-gradient(90deg, #ffd700, #fff8dc);
font-weight:bold;
}

tr.second{
background: linear-gradient(90deg, #c0c0c0, #f5f5f5);
font-weight:bold;
}

tr.third{
background: linear-gradient(90deg, #cd7f32, #ffe4c4);
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<header style="text-align:center; margin-bottom:20px;">

<h1 style="margin-bottom:5px;">
🚒 Letní večer SDH Lubina II Větřkovice
</h1>

<h2 style="margin-bottom:10px; color:#555;">
18. července 2026
</h2>

<h3 style="
margin:0;
color:#c62828;
font-size:22px;
letter-spacing:1px;
">
🏆 Výsledky soutěže
</h3>

</header>

<table>
<thead>
<tr>
<th>Pořadí</th>
<th>Příjmení</th>
<th>Jméno</th>
<th>Nejlepší čas</th>
</tr>
</thead>

<tbody id="tab"></tbody>
</table>

</div>

<script type="module">
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBnHKiL6ANjvRbUpd3sv4TwGuq7-4_c6J8",
  authDomain: "zkouska-2.firebaseapp.com",
  projectId: "zkouska-2",
  storageBucket: "zkouska-2.firebasestorage.app",
  messagingSenderId: "51239007198",
  appId: "1:51239007198:web:4e98cdfd91279a337da34f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const col = collection(db, "motani_hadic");

let data = [];

/* ================= REALTIME ================= */
onSnapshot(col, (snap)=>{

data = [];

snap.forEach(d=>{
data.push({id:d.id, ...d.data()});
});

render();

});

/* ================= RENDER ================= */
function render(){

const t = document.getElementById("tab");
t.innerHTML = "";

// 🛡️ OCHRANA
if(!data || data.length === 0){
t.innerHTML = `
<tr><td colspan="4">Žádná data</td></tr>
`;
return;
}

// kopie dat
const sorted = [...data].sort((a,b)=>{

const aTime = (a && a.nejlepsi) ? a.nejlepsi.split(":") : ["99","99"];
const bTime = (b && b.nejlepsi) ? b.nejlepsi.split(":") : ["99","99"];

const aMin = (+aTime[0])*60 + (+aTime[1]);
const bMin = (+bTime[0])*60 + (+bTime[1]);

return aMin - bMin;
});

sorted.forEach((z,i)=>{

let medal = "";
let cls = "";

if(i === 0){ medal = "🥇 "; cls="first"; }
else if(i === 1){ medal = "🥈 "; cls="second"; }
else if(i === 2){ medal = "🥉 "; cls="third"; }

t.innerHTML += `
<tr class="${cls}">
<td>${medal}${i+1}</td>
<td>${z.prijmeni || "-"}</td>
<td>${z.jmeno || "-"}</td>
<td><b>${z.nejlepsi || "-"}</b></td>
</tr>
`;

});

}
</script>

</body>
</html>
